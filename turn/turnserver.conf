# === Основные настройки ===
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0
external-ip=${PUBLIC_IP}

# === Диапазон портов для релея ===
min-port=49152
max-port=65535

# === Аутентификация ===
lt-cred-mech
use-auth-secret
static-auth-secret=${TURN_SECRET}
realm=${DOMAIN}
user=${TURN_USERNAME}:${TURN_PASSWORD}

# === Безопасность ===
fingerprint
no-cli
stale-nonce

# === Производительность ===
no-tcp-relay

# === Логирование ===
log-file=/var/log/turnserver/turn.log
simple-log
no-stdout-log