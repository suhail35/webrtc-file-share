# Упрощенная конфигурация для разработки
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0
external-ip=127.0.0.1

# Уменьшаем диапазон портов для dev
min-port=50000
max-port=50100

# Простая аутентификация
lt-cred-mech
user=devuser:devpassword123
realm=localhost

# Безопасность (упрощенная для dev)
fingerprint
no-cli

# Логирование - ИСПРАВЛЕНО!
log-file=/var/log/turnserver/turn.log
simple-log
verbose=1  # вместо просто "verbose"

# Можно добавить уровень детализации
# Verbose level: 0 (none), 1 (default), 2 (high), 3 (very high)
# verbose-level=1