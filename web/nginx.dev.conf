events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Логирование для отладки
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log debug;

    server {
        listen 80;
        server_name localhost;

        # Корень с клиентскими файлами
        root /usr/share/nginx/html;
        index index.html;

        # Включаем CORS для разработки
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;

        # Статические файлы
        location / {
            try_files $uri $uri/ =404;
        }

        # Статические файлы CSS
        location /css/ {
            alias /usr/share/nginx/html/css/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Статические файлы JS
        location /js/ {
            alias /usr/share/nginx/html/js/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Favicon
        location = /favicon.ico {
            alias /usr/share/nginx/html/favicon.ico;
            log_not_found off;
            access_log off;
        }

        # API для загрузки (режим relay)
        location /upload {
            client_max_body_size 100M;
            proxy_pass http://host.docker.internal:5001;  # К сигнальному серверу
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Для больших файлов
            proxy_request_buffering off;
            proxy_http_version 1.1;
        }

        # Скачивание через relay
        location /download {
            alias /tmp/uploads;
            autoindex on;
        }

        # Для отладки WebSocket
        location /socket.io/ {
            proxy_pass http://host.docker.internal:5001/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Страница статуса для разработки
        location /status {
            return 200 '{"status":"dev","services":{"signaling":"ws://localhost:5001","turn":"turn:localhost:3479"}}';
            add_header Content-Type application/json;
        }
    }
}