events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Логирование
    access_log off;
    error_log /var/log/nginx/error.log error;

    # Лимиты для безопасности
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # Редирект HTTP -> HTTPS
    server {
        listen 80;
        server_name station307.suhail35.ru www.station307.suhail35.ru;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS сервер
    server {
        listen 443 ssl http2;
        server_name station307.suhail35.ru www.station307.suhail35.ru;

        # SSL сертификаты
        ssl_certificate /etc/nginx/ssl/live/station307.suhail35.ru/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/station307.suhail35.ru/privkey.pem;

        # SSL настройки
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Корень сайта
        root /usr/share/nginx/html;
        index index.html;

        # Статика с кэшированием
        location /css/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /js/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # API прокси с лимитами
        location /socket.io/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://signaling-server:5000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Загрузка файлов (curl)
        location / {
            limit_req zone=api burst=10 nodelay;
            client_max_body_size 100M;
            proxy_pass http://signaling-server:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_request_buffering off;
        }

        # Скачивание файлов
        location /d/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://signaling-server:5000/d/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check (ИСПРАВЛЕНО)
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}